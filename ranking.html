<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M/A Station — 실시간 랭킹</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+KR:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d0d2b 100%);
            color: #eee; font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh; padding: 20px;
        }

        .header {
            text-align: center; margin-bottom: 20px;
            padding-bottom: 14px; border-bottom: 2px solid rgba(255,213,79,0.3);
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif; font-size: clamp(1.4rem, 4vw, 2.4rem);
            color: #ffd54f; letter-spacing: 2px; margin-bottom: 4px;
        }
        .header .sub {
            font-size: clamp(0.7rem, 2vw, 1rem); color: #78909c;
        }
        .live-dot {
            display: inline-block; width: 8px; height: 8px;
            background: #4caf50; border-radius: 50%; margin-right: 6px;
            animation: live-pulse 1.5s infinite;
        }
        @keyframes live-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .stats-bar {
            display: flex; justify-content: center; gap: clamp(16px, 4vw, 40px);
            margin-bottom: 16px; flex-wrap: wrap;
        }
        .stat-item {
            text-align: center; background: rgba(255,255,255,0.05);
            padding: 8px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
        }
        .stat-num {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 3vw, 2rem); color: #64b5f6; font-weight: 700;
        }
        .stat-label { font-size: clamp(0.6rem, 1.5vw, 0.8rem); color: #78909c; margin-top: 2px; }

        .table-container {
            max-width: 900px; margin: 0 auto;
            background: rgba(0,0,0,0.3); border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08); overflow: hidden;
        }
        table {
            width: 100%; border-collapse: collapse;
            font-size: clamp(0.72rem, 1.8vw, 1rem);
        }
        thead th {
            background: rgba(255,213,79,0.1); color: #ffd54f;
            padding: clamp(8px, 1.5vh, 14px) 8px; font-weight: 700;
            border-bottom: 2px solid rgba(255,213,79,0.2);
            position: sticky; top: 0;
        }
        tbody td {
            padding: clamp(7px, 1.2vh, 12px) 8px; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.3s;
        }
        tbody tr { transition: background 0.3s; }
        tbody tr:hover { background: rgba(255,255,255,0.05); }

        /* 메달 행 */
        tbody tr:nth-child(1) td { background: rgba(255,213,79,0.08); }
        tbody tr:nth-child(2) td { background: rgba(207,216,220,0.05); }
        tbody tr:nth-child(3) td { background: rgba(188,170,164,0.04); }
        .rank-medal { font-size: clamp(1rem, 2.5vw, 1.5rem); }
        .name-cell { font-weight: 700; text-align: left; padding-left: 12px; }
        .score-cell {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.8rem, 2vw, 1.1rem); font-weight: 700; color: #ffd54f;
        }
        .fail-mark { color: #ef5350; opacity: 0.7; font-size: 0.8em; }
        .sub-score { color: #90a4ae; font-size: 0.85em; }

        /* 새 항목 하이라이트 */
        @keyframes new-entry {
            0% { background: rgba(100,181,246,0.3); }
            100% { background: transparent; }
        }
        .new-entry td { animation: new-entry 3s ease-out; }

        .empty-msg {
            text-align: center; padding: 60px 20px;
            color: #555; font-size: clamp(1rem, 3vw, 1.4rem);
        }
        .footer {
            text-align: center; margin-top: 16px;
            font-size: clamp(0.55rem, 1.3vw, 0.72rem); color: #444;
        }

        /* 관리 버튼 */
        .admin-bar {
            max-width: 900px; margin: 12px auto 0; display: flex;
            justify-content: flex-end; gap: 8px;
        }
        .admin-btn {
            padding: 6px 14px; font-size: 0.72rem; color: #888;
            background: rgba(255,255,255,0.05); border: 1px solid #444;
            border-radius: 4px; cursor: pointer;
        }
        .admin-btn:hover { color: #fff; border-color: #888; }
        .admin-btn.danger:hover { color: #ef5350; border-color: #ef5350; }

        /* 탭 */
        .tab-bar {
            max-width: 900px; margin: 0 auto 10px; display: flex; gap: 6px;
        }
        .tab-btn {
            padding: 8px 20px; font-size: clamp(0.75rem, 2vw, 0.95rem);
            font-weight: 700; border-radius: 6px 6px 0 0; cursor: pointer;
            border: 1px solid #444; border-bottom: none;
            background: rgba(255,255,255,0.03); color: #666;
        }
        .tab-btn.active {
            background: rgba(255,213,79,0.12); color: #ffd54f;
            border-color: rgba(255,213,79,0.3);
        }
        .tab-date {
            font-size: clamp(0.6rem, 1.5vw, 0.78rem); color: #78909c;
            margin-left: 6px; font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏆 M/A STATION RANKING</h1>
        <div class="sub"><span class="live-dot"></span>실시간 자동 갱신 · CVS670 제어밸브 고장대응 시뮬레이터</div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-num" id="stat-players">0</div>
            <div class="stat-label">참가자</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="stat-top">-</div>
            <div class="stat-label">최고 점수</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="stat-avg">-</div>
            <div class="stat-label">평균 점수</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="stat-success">0%</div>
            <div class="stat-label">성공률</div>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" id="tab-today" onclick="switchTab('today')">📅 오늘의 랭킹<span class="tab-date" id="today-date"></span></button>
        <button class="tab-btn" id="tab-all" onclick="switchTab('all')">🏆 전체 랭킹</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width:50px;">순위</th>
                    <th style="text-align:left; padding-left:12px;">이름</th>
                    <th>총점</th>
                    <th>회차</th>
                    <th>고장유형</th>
                    <th>⚡ 신속</th>
                    <th>🛡 안전</th>
                    <th>🎯 정밀</th>
                </tr>
            </thead>
            <tbody id="ranking-body"></tbody>
        </table>
        <div class="empty-msg" id="empty-msg">대기 중... 학습자의 점수 제출을 기다립니다.</div>
    </div>

    <div class="admin-bar">
        <button class="admin-btn" id="btn-refresh" onclick="loadRanking()">🔄 새로고침</button>
        <button class="admin-btn danger" id="btn-clear" onclick="clearRanking()">🗑 전체 삭제</button>
    </div>

    <div class="footer">
        한빛교육훈련센터 · M/A Station 시뮬레이터 · Firebase Realtime Database
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        // ★★★ Firebase 설정 — 시뮬레이터와 동일한 config 사용 ★★★
        const firebaseConfig = {
            apiKey: "AIzaSyAyEMHjR_ocjTxT7yZs5K95PWtjTpbWUNs",
            authDomain: "filter-simulator.firebaseapp.com",
            databaseURL: "https://ma-station-cb4b9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "filter-simulator",
            storageBucket: "filter-simulator.firebasestorage.app",
            messagingSenderId: "636862608696",
            appId: "1:636862608696:web:6630ad47f17dfba6287dcd"
        };

        let firebaseReady = false;
        try {
            firebase.initializeApp(firebaseConfig);
            firebaseReady = true;
        } catch (e) { console.warn('Firebase init failed:', e); }

        const DB_PATH = 'ma_station_rankings';
        const body = document.getElementById('ranking-body');
        const emptyMsg = document.getElementById('empty-msg');
        let prevKeys = new Set();
        let allEntries = [];
        let currentTab = 'today';

        // 오늘 날짜 표시 (KST)
        const now = new Date();
        const kstNow = new Date(now.getTime() + 9 * 60 * 60 * 1000);
        document.getElementById('today-date').textContent =
            `(${kstNow.getUTCFullYear()}.${String(kstNow.getUTCMonth()+1).padStart(2,'0')}.${String(kstNow.getUTCDate()).padStart(2,'0')})`;

        function getTodayStartKST() {
            const now = new Date();
            const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
            const y = kst.getUTCFullYear(), m = kst.getUTCMonth(), d = kst.getUTCDate();
            return new Date(Date.UTC(y, m, d) - 9 * 60 * 60 * 1000).getTime();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-today').classList.toggle('active', tab === 'today');
            document.getElementById('tab-all').classList.toggle('active', tab === 'all');
            render();
            updateStats();
        }

        function loadRanking() {
            if (!firebaseReady) {
                emptyMsg.textContent = '⚠ Firebase 미설정 — config를 입력해주세요';
                emptyMsg.style.display = 'block';
                return;
            }

            firebase.database().ref(DB_PATH)
                .orderByChild('score')
                .limitToLast(200)
                .once('value')
                .then(snap => {
                    allEntries = [];
                    snap.forEach(c => allEntries.push({ key: c.key, ...c.val() }));
                    allEntries.sort((a, b) => b.score - a.score);
                    render();
                    updateStats();
                });
        }

        function getFilteredEntries() {
            if (currentTab === 'today') {
                const todayStart = getTodayStartKST();
                return allEntries.filter(e => e.timestamp >= todayStart);
            }
            return allEntries;
        }

        function render() {
            const entries = getFilteredEntries();
            body.innerHTML = '';
            if (!entries.length) {
                emptyMsg.style.display = 'block';
                emptyMsg.textContent = currentTab === 'today'
                    ? '오늘 제출된 점수가 없습니다. 학습자의 도전을 기다립니다...'
                    : '아직 제출된 점수가 없습니다.';
                return;
            }
            emptyMsg.style.display = 'none';

            const newKeys = new Set(entries.map(e => e.key));

            entries.forEach((e, i) => {
                const tr = document.createElement('tr');
                if (!prevKeys.has(e.key) && prevKeys.size > 0) {
                    tr.classList.add('new-entry');
                }

                const medal = i === 0 ? '<span class="rank-medal">🥇</span>'
                    : i === 1 ? '<span class="rank-medal">🥈</span>'
                    : i === 2 ? '<span class="rank-medal">🥉</span>'
                    : (i + 1);

                const ft = e.faultType === 'open' ? 'Fail Open' : 'Fail Close';
                const multLabel = e.multiplier > 1 ? `${e.attempt}회 <span style="color:#66bb6a">×${e.multiplier}</span>`
                    : e.multiplier < 1 ? `${e.attempt}회 <span style="color:#ef5350">×${e.multiplier}</span>`
                    : `${e.attempt}회`;
                const failMark = e.success ? '' : ' <span class="fail-mark">(실패)</span>';

                tr.innerHTML = `
                    <td>${medal}</td>
                    <td class="name-cell">${e.name}${failMark}</td>
                    <td class="score-cell">${e.score.toLocaleString()}</td>
                    <td>${multLabel}</td>
                    <td>${ft}</td>
                    <td class="sub-score">${e.speed.toLocaleString()}</td>
                    <td class="sub-score">${e.safety.toLocaleString()}</td>
                    <td class="sub-score">${e.precision.toLocaleString()}</td>
                `;
                body.appendChild(tr);
            });

            prevKeys = newKeys;
        }

        function updateStats() {
            const entries = getFilteredEntries();
            document.getElementById('stat-players').textContent = entries.length;

            if (entries.length > 0) {
                document.getElementById('stat-top').textContent = entries[0].score.toLocaleString();
                document.getElementById('stat-avg').textContent =
                    Math.round(entries.reduce((s, e) => s + e.score, 0) / entries.length).toLocaleString();
                document.getElementById('stat-success').textContent =
                    Math.round(entries.filter(e => e.success).length / entries.length * 100) + '%';
            } else {
                document.getElementById('stat-top').textContent = '-';
                document.getElementById('stat-avg').textContent = '-';
                document.getElementById('stat-success').textContent = '0%';
            }
        }

        function clearRanking() {
            if (!confirm('모든 랭킹 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
            if (!firebaseReady) return;
            firebase.database().ref(DB_PATH).remove().then(() => {
                allEntries = [];
                prevKeys = new Set();
                render();
                updateStats();
            });
        }

        // 초기 로드 + 5초 폴링
        loadRanking();
        setInterval(loadRanking, 5000);

        // 실시간 리스너
        if (firebaseReady) {
            firebase.database().ref(DB_PATH).on('child_added', () => {
                setTimeout(loadRanking, 300);
            });
        }
    </script>
</body>
</html>
